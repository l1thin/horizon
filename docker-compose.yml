# Horizon - docker-compose.yml - owned by Dev 3 (AI + Infra)
#
# Local development stack: backend + ai + Redis.

version: '3.9'

services:
  backend:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [redis]
    environment:
      - PYTHONPATH=/app

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --save 60 1 --loglevel warning
